<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark navy background with rounded corners (like an app icon) -->
  <rect width="100" height="100" fill="#050d1a" rx="18"/>

  <!-- Chrome outer ring of badge -->
  <ellipse cx="50" cy="50" rx="42" ry="29" fill="#b0b8c4"/>
  <!-- Navy fill inner badge -->
  <ellipse cx="50" cy="50" rx="38" ry="25" fill="#0F2B5B"/>
  <!-- Subtle highlight line top of badge -->
  <ellipse cx="50" cy="39" rx="28" ry="6" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>

  <!-- EA text — bold, white -->
  <text
    x="50" y="57"
    font-family="Arial Black, Impact, Arial, sans-serif"
    font-size="28"
    font-weight="900"
    fill="#e8eef5"
    text-anchor="middle"
    letter-spacing="-0.5"
  >EA</text>
</svg>
